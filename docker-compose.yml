version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      STAGEFLOW_SERVICE_NAME: stageflow
      STAGEFLOW_ENV: local
      STAGEFLOW_VERSION: local-compose
      STAGEFLOW_HTTP_ADDR: :8080
      STAGEFLOW_LOG_LEVEL: info
      STAGEFLOW_METRICS_PATH: /metrics
      STAGEFLOW_TRACING_ENABLED: "true"
      STAGEFLOW_TRACING_EXPORTER: stdout
      STAGEFLOW_REDIS_ADDR: redis:6379
      STAGEFLOW_REDIS_PREFIX: stageflow
      STAGEFLOW_ALLOWED_HOSTS: example.internal,host.docker.internal,sandbox
    ports:
      - "8080:8080"

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    environment:
      STAGEFLOW_SANDBOX_ADDR: :8091
      STAGEFLOW_SANDBOX_LOG_LEVEL: info
    ports:
      - "8091:8091"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stageflow
      POSTGRES_USER: stageflow
      POSTGRES_PASSWORD: stageflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
