{{define "content"}}
<section class="section-header"><div><h1>Secrets</h1><p>Secret values are hidden after creation.</p></div><a class="button" href="{{uiURL .Page.Lang (printf "/ui/workspaces/%s/secrets/new" .Workspace.ID)}}">New secret</a></section>
<section class="card"><table><thead><tr><th>Secret key</th><th>Actions</th></tr></thead><tbody>{{range .Secrets}}<tr><td><code>{{.Name}}</code></td><td><form method="post" action="{{uiURL $.Page.Lang (printf "/ui/workspaces/%s/secrets/%s/delete" $.Workspace.ID .Name)}}"><button class="button button-small button-danger" type="submit">Delete</button></form></td></tr>{{else}}<tr><td colspan="2">No secrets configured.</td></tr>{{end}}</tbody></table></section>
{{end}}
