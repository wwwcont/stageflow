{{define "content"}}
<section class="section-header"><div><h1>New secret</h1></div></section>
<form class="card stack" method="post" action="{{.SubmitURL}}"><label>Name<input name="name" value="{{.Form.Name}}"></label><label>Value<textarea name="value" rows="6">{{.Form.Value}}</textarea></label><p class="muted">The UI will not show the secret value again after save.</p><div class="actions"><button class="button" type="submit">{{.SubmitLabel}}</button></div></form>
{{end}}
